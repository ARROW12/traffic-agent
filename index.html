<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Flight Plan Interface</title>
    <style>
        /* Base Styling & Dark Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #38bdf8;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid #334155;
            border-radius: 6px;
            background-color: #0f172a;
            color: #f8fafc;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }
        button {
            width: 100%;
            padding: 0.85rem;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }
        button:hover {
            background-color: #0369a1;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
            transform: none;
        }
        #statusMessage {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.95rem;
            min-height: 24px;
            font-weight: 500;
        }
        
        /* Status Colors */
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .loading { color: #fbbf24; }
    </style>
</head>
<body>

<div class="container">
    <h2>✈️ JARVIS Link</h2>
    
    <div class="form-group">
        <label for="sourceInput">Origin Vector</label>
        <input type="text" id="sourceInput" placeholder="e.g., Nanakramguda, Hyderabad">
    </div>
    
    <div class="form-group">
        <label for="destInput">Target Destination</label>
        <input type="text" id="destInput" placeholder="e.g., RMZ Spire, Tower 100">
    </div>
    
    <button id="triggerBtn" onclick="fireFlightPlan()">Launch Flight Plan</button>
    
    <div id="statusMessage"></div>
</div>

<script>
    // ==============================================================================
    // IMPORTANT: Replace this placeholder with the exact Twilio Function URL
    // you created in Step 1 (e.g., https://github-bridge-xxxx.twil.io/web-trigger)
    // ==============================================================================
    const TWILIO_WEBHOOK_URL = 'YOUR_NEW_TWILIO_WEB_TRIGGER_URL';

    async function fireFlightPlan() {
        const srcInput = document.getElementById('sourceInput');
        const destInput = document.getElementById('destInput');
        const statusText = document.getElementById('statusMessage');
        const btn = document.getElementById('triggerBtn');
        
        const src = srcInput.value.trim();
        const dest = destInput.value.trim();

        // 1. Input Validation
        if (!src || !dest) {
            statusText.className = 'error';
            statusText.innerText = "⚠️ Please provide both Origin and Destination.";
            return;
        }

        // 2. Set UI to Loading State
        btn.disabled = true;
        btn.innerText = "Transmitting to Core...";
        statusText.className = 'loading';
        statusText.innerText = "Firing request to GitHub Actions...";

        // 3. Execute Secure Backend Call
        try {
            const response = await fetch(TWILIO_WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    source: src,
                    destination: dest
                })
            });

            const data = await response.json();
            
            // 4. Handle Response
            if (response.ok && data.success) {
                statusText.className = 'success';
                statusText.innerText = data.message; 
                
                // Optional: Clear fields after successful trigger
                srcInput.value = '';
                destInput.value = '';
            } else {
                statusText.className = 'error';
                statusText.innerText = "⚠️ Error: " + (data.error || "Failed to trigger pipeline.");
            }
        } catch (error) {
            statusText.className = 'error';
            statusText.innerText = "⚠️ Network error connecting to Twilio Bridge.";
            console.error("Fetch Error:", error);
        } finally {
            // 5. Restore UI State
            btn.disabled = false;
            btn.innerText = "Launch Flight Plan";
        }
    }
</script>

</body>
</html>
