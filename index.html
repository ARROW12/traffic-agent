<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Flight Plan Interface</title>
    <style>
        body { 
            background-color: #0f172a; 
            color: #e2e8f0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .container { 
            background-color: #1e293b; padding: 2.5rem; border-radius: 12px; 
            width: 100%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); box-sizing: border-box; 
        }
        h2 { color: #38bdf8; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #94a3b8; }
        input, button { 
            width: 100%; padding: 0.85rem; box-sizing: border-box; 
            border-radius: 6px; font-size: 1rem; 
        }
        input { 
            background-color: #0f172a; border: 1px solid #334155; color: white; transition: border 0.2s;
        }
        input:focus { outline: none; border-color: #38bdf8; }
        button { 
            background-color: #0284c7; color: white; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 0.5rem;
        }
        button:hover { background-color: #0369a1; }
        button:disabled { background-color: #475569; cursor: not-allowed; }
        #statusMessage { margin-top: 1.5rem; text-align: center; font-weight: 500; min-height: 24px; }
    </style>
</head>
<body>

<div class="container">
    <h2>✈️ JARVIS Link</h2>
    
    <div class="form-group">
        <label for="sourceInput">Origin Vector</label>
        <input type="text" id="sourceInput" placeholder="e.g., Nanakramguda">
    </div>
    
    <div class="form-group">
        <label for="destInput">Target Destination</label>
        <input type="text" id="destInput" placeholder="e.g., RMZ Spire">
    </div>
    
    <button id="triggerBtn" onclick="fireFlightPlan()">Launch Flight Plan</button>
    
    <div id="statusMessage"></div>
</div>

<script>
    const TWILIO_WEBHOOK_URL = 'https://github-bridge-1669.twil.io/web-trigger';

    async function fireFlightPlan() {
        const statusText = document.getElementById('statusMessage');
        const btn = document.getElementById('triggerBtn');
        const src = document.getElementById('sourceInput').value.trim();
        const dest = document.getElementById('destInput').value.trim();

        if (!src || !dest) {
            statusText.style.color = "#fbbf24"; // Yellow
            statusText.innerText = "⚠️ Missing origin or destination.";
            return;
        }

        // Lock the UI
        btn.disabled = true;
        btn.innerText = "Transmitting...";
        statusText.style.color = "#fbbf24";
        statusText.innerText = "Contacting Bridge...";

        try {
            const response = await fetch(TWILIO_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ source: src, destination: dest })
            });

            // Parse response body
            const data = await response.json();
            
            // Check if backend reported success
            if (data.success) {
                statusText.style.color = "#4ade80"; // Green
                statusText.innerText = "✅ " + data.message;
                
                // Clear fields on success
                document.getElementById('sourceInput').value = '';
                document.getElementById('destInput').value = '';
            } else {
                // Backend sent a controlled error (like a 404 mapped to a message)
                throw new Error(data.error || "Unknown error from bridge.");
            }
        } catch (err) {
            // Display the exact error message
            statusText.style.color = "#f87171"; // Red
            statusText.innerText = "⚠️ " + err.message;
            console.error("Transmission Error:", err);
        } finally {
            // Unlock the UI
            btn.disabled = false;
            btn.innerText = "Launch Flight Plan";
        }
    }
</script>
</body>
</html>
