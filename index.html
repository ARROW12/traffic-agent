<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Flight Plan Interface</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #38bdf8; text-align: center; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #94a3b8; }
        input[type="text"] {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid #334155;
            border-radius: 6px;
            background-color: #0f172a;
            color: #f8fafc;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.85rem;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled { background-color: #475569; cursor: not-allowed; }
        #statusMessage { margin-top: 1.5rem; text-align: center; font-weight: 500; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .loading { color: #fbbf24; }
    </style>
</head>
<body>

<div class="container">
    <h2>✈️ JARVIS Link</h2>
    <div class="form-group">
        <label for="sourceInput">Origin Vector</label>
        <input type="text" id="sourceInput" placeholder="e.g., Nanakramguda">
    </div>
    <div class="form-group">
        <label for="destInput">Target Destination</label>
        <input type="text" id="destInput" placeholder="e.g., RMZ Spire">
    </div>
    <button id="triggerBtn" onclick="fireFlightPlan()">Launch Flight Plan</button>
    <div id="statusMessage"></div>
</div>

<script>
    const TWILIO_WEBHOOK_URL = 'https://github-bridge-1669.twil.io/web-trigger';

    async function fireFlightPlan() {
        const srcInput = document.getElementById('sourceInput');
        const destInput = document.getElementById('destInput');
        const statusText = document.getElementById('statusMessage');
        const btn = document.getElementById('triggerBtn');
        
        const src = srcInput.value.trim();
        const dest = destInput.value.trim();

        if (!src || !dest) {
            statusText.className = 'error';
            statusText.innerText = "⚠️ Please fill in all fields.";
            return;
        }

        btn.disabled = true;
        btn.innerText = "Transmitting...";
        statusText.className = 'loading';
        statusText.innerText = "Contacting GitHub Actions...";

        try {
            const response = await fetch(TWILIO_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ source: src, destination: dest })
            });

            const data = await response.json();
            
            if (response.ok && data.success) {
                statusText.className = 'success';
                statusText.innerText = data.message;
                srcInput.value = '';
                destInput.value = '';
            } else {
                throw new Error(data.error || "Failed to trigger pipeline.");
            }
        } catch (error) {
            statusText.className = 'error';
            statusText.innerText = "⚠️ " + error.message;
            console.error("Transmission Error:", error);
        } finally {
            btn.disabled = false;
            btn.innerText = "Launch Flight Plan";
        }
    }
</script>
</body>
</html>
