<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Traffic Agent - Intelligent Traffic Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .search-card {
            grid-column: 1;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results-card {
            grid-column: 2;
            display: none;
        }

        .results-card.show {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #d32f2f;
            padding: 15px;
            background: #ffebee;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .results-section {
            margin-bottom: 25px;
        }

        .results-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .location-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .location-info p {
            margin: 5px 0;
            color: #555;
        }

        .rating {
            color: #ffc107;
            font-weight: bold;
        }

        .route-option {
            background: #f9f9f9;
            padding: 15px;
            border-left: 4px solid #667eea;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .route-option strong {
            color: #333;
        }

        .eta {
            font-size: 1.3em;
            color: #667eea;
            font-weight: bold;
        }

        .cost {
            color: #27ae60;
            font-weight: 600;
        }

        .trend {
            padding: 8px 12px;
            background: #e8f5e9;
            border-radius: 4px;
            display: inline-block;
            font-size: 0.9em;
        }

        .weather-aqi {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .weather-box, .aqi-box {
            padding: 15px;
            background: #f5f5f5;
            border-radius: 6px;
            text-align: center;
        }

        .weather-box h4, .aqi-box h4 {
            color: #555;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .weather-box p, .aqi-box p {
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
        }

        .nav-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9em;
            transition: background 0.3s;
        }

        .nav-link:hover {
            background: #764ba2;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .search-card {
                grid-column: 1;
            }

            .results-card {
                grid-column: 1;
            }

            header h1 {
                font-size: 2em;
            }

            .weather-aqi {
                grid-template-columns: 1fr;
            }
        }

        .info-section {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 JARVIS Traffic Agent</h1>
            <p>Intelligent Real-Time Traffic Analysis & Route Optimization</p>
        </header>

        <div class="main-content">
            <div class="card search-card">
                <h2>Plan Your Route</h2>
                
                <div class="input-group">
                    <label for="source">Starting Location</label>
                    <input 
                        type="text" 
                        id="source" 
                        placeholder="e.g., Hitech City, Hyderabad"
                        value="Hitech City, Hyderabad"
                    >
                </div>

                <div class="input-group">
                    <label for="destination">Destination</label>
                    <input 
                        type="text" 
                        id="destination" 
                        placeholder="e.g., Banjara Hills"
                        value="Banjara Hills"
                    >
                </div>

                <button onclick="analyzeTraffic()">🚀 Analyze Traffic</button>

                <div id="error" class="error" style="display: none;"></div>
            </div>

            <div class="card results-card" id="resultsCard">
                <div id="resultsContent"></div>
            </div>
        </div>

        <div class="info-section">
            <p>📱 Also available on WhatsApp! • 🔄 Real-time updates • 🌍 Multi-modal routing</p>
        </div>
    </div>

    <script>
        async function analyzeTraffic() {
            const source = document.getElementById('source').value.trim();
            const destination = document.getElementById('destination').value.trim();
            const errorDiv = document.getElementById('error');
            const resultsCard = document.getElementById('resultsCard');
            const resultsContent = document.getElementById('resultsContent');

            // Validation
            if (!source || !destination) {
                errorDiv.textContent = '⚠️ Please enter both source and destination';
                errorDiv.style.display = 'block';
                return;
            }

            errorDiv.style.display = 'none';
            resultsContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>Analyzing traffic...</p></div>';
            resultsCard.classList.add('show');

            try {
                // Call the API with OUTPUT_JSON=true to get structured data
                const response = await fetch('api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source, destination })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to analyze traffic');
                }

                displayResults(data);
            } catch (error) {
                resultsContent.innerHTML = `<div class="error">❌ ${error.message}</div>`;
            }
        }

        function displayResults(data) {
            const resultsContent = document.getElementById('resultsContent');
            const d = data.data;

            let html = `
                <h2>📊 Traffic Analysis Results</h2>
                <p style="color: #999; font-size: 0.9em;">Updated: ${d.timestamp}</p>

                <div class="results-section">
                    <h3>📍 Route Information</h3>
                    <div class="location-info">
                        <p><strong>From:</strong> ${d.source} 
                            ${d.source_details.rating !== 'N/A' ? `<span class="rating">⭐ ${d.source_details.rating}/5 (${d.source_details.reviews} reviews)</span>` : ''}
                        </p>
                        <p><strong>To:</strong> ${d.destination}
                            ${d.dest_details.rating !== 'N/A' ? `<span class="rating">⭐ ${d.dest_details.rating}/5 (${d.dest_details.reviews} reviews)</span>` : ''}
                        </p>
                    </div>
                </div>

                <div class="weather-aqi">
                    <div class="weather-box">
                        <h4>🌡️ Weather</h4>
                        <p>${d.weather}</p>
                    </div>
                    <div class="aqi-box">
                        <h4>😷 Air Quality</h4>
                        <p>Source: ${d.aqi.source}</p>
                        <p style="font-size: 0.9em; margin-top: 5px;">Dest: ${d.aqi.destination}</p>
                    </div>
                </div>
            `;

            // Car Profile
            if (d.car_profile) {
                const car = d.car_profile;
                html += `
                    <div class="results-section">
                        <h3>🚗 Car Route (${car.via})</h3>
                        <div class="route-option">
                            <p>⏱️ <span class="eta">${car.current_eta}</span> | 📏 ${car.distance}</p>
                            <p>⛽ <span class="cost">${car.fuel_cost}</span></p>
                            <p>📈 <span class="trend">${car.trend}</span></p>
                            <p>💡 ${car.recommendation}</p>
                            <a href="${car.nav_link}" target="_blank" class="nav-link">🔗 Open in Maps</a>
                        </div>
                    </div>
                `;
            }

            // Bike Profile
            if (d.bike_profile) {
                const bike = d.bike_profile;
                html += `
                    <div class="results-section">
                        <h3>🏍️ Bike Route (${bike.via})</h3>
                        <div class="route-option">
                            <p>⏱️ <span class="eta">${bike.current_eta}</span> | 📏 ${bike.distance}</p>
                            <p>⛽ <span class="cost">${bike.fuel_cost}</span></p>
                            <p>📈 <span class="trend">${bike.trend}</span></p>
                            <p>💡 ${bike.recommendation}</p>
                            <a href="${bike.nav_link}" target="_blank" class="nav-link">🔗 Open in Maps</a>
                        </div>
                    </div>
                `;
            }

            document.getElementById('resultsContent').innerHTML = html;
        }

        // Auto-analyze on load
        window.addEventListener('load', function() {
            analyzeTraffic();
        });
    </script>
</body>
</html>
