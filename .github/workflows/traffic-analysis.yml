name: Traffic Analysis Pipeline

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Starting location'
        required: true
        default: ''
      destination:
        description: 'Destination location'
        required: true
        default: ''

jobs:
  analyze-traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests twilio python-dotenv
      
      - name: Run Traffic Analysis
        env:
          SOURCE_LOCATION: ${{ github.event.inputs.source }}
          DESTINATION_LOCATION: ${{ github.event.inputs.destination }}
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          YOUR_CELL_NUMBER: ${{ secrets.YOUR_CELL_NUMBER }}
          HOME_ADDRESS: ${{ secrets.HOME_ADDRESS }}
          OFFICE_ADDRESS: ${{ secrets.OFFICE_ADDRESS }}
        run: |
          python traffic_agent.py
      
      - name: Log completion
        run: echo "Traffic analysis completed for: ${{ github.event.inputs.source }} to ${{ github.event.inputs.destination }}"
