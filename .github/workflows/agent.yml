name: Traffic Agent Copilot

on:
  repository_dispatch:
    types: [whatsapp_trigger]
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests twilio scikit-learn numpy

      - name: Execute Agent Script
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          YOUR_CELL_NUMBER: ${{ secrets.YOUR_CELL_NUMBER }}
          HOME_ADDRESS: ${{ secrets.HOME_ADDRESS }}
          OFFICE_ADDRESS: ${{ secrets.OFFICE_ADDRESS }}
          TRIGGER_MESSAGE: ${{ github.event.client_payload.message }}
        run: python traffic_agent.py
