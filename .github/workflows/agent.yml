name: JARVIS Traffic Protocol

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Trigger message from WhatsApp (e.g., 'from Mantri Celestia to RMZ Spire in 30 mins')"
        required: true
        default: ""

jobs:
  run-traffic-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests numpy scikit-learn twilio

      - name: Run Traffic Agent
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          YOUR_CELL_NUMBER: ${{ secrets.YOUR_CELL_NUMBER }}
          HOME_ADDRESS: ${{ secrets.HOME_ADDRESS }}
          OFFICE_ADDRESS: ${{ secrets.OFFICE_ADDRESS }}
          TRIGGER_MESSAGE: ${{ github.event.inputs.message }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} 
        run: python traffic_agent.py
