name: Run Traffic Agent On Demand

on:
  repository_dispatch:
    types: [whatsapp_trigger]
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub UI for testing

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests twilio

      - name: Execute Agent Script
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          YOUR_CELL_NUMBER: ${{ secrets.YOUR_CELL_NUMBER }}
          HOME_ADDRESS: ${{ secrets.HOME_ADDRESS }}
          OFFICE_ADDRESS: ${{ secrets.OFFICE_ADDRESS }}
        run: python traffic_agent.py
